name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch new vulnerability signatures
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: CodeQL Analyze (Bazel)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Bazel-native CodeQL analysis
        run: bazel run //quality/static_analysis:codeql_lint -- --target=//...

      - name: Upload SARIF to GitHub Code Scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql_results/codeql-results.sarif
          category: /language:cpp

      - name: Restore quality history
        if: always()
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "${REPO_NAME}" == "${OWNER}.github.io" ]]; then
            BASE_URL="https://${OWNER}.github.io"
          else
            BASE_URL="https://${OWNER}.github.io/${REPO_NAME}"
          fi
          mkdir -p codeql_results
          curl -fsSL "${BASE_URL}/dashboard/quality_history.json" \
            -o codeql_results/quality_history.json 2>/dev/null || true

      - name: Generate analysis dashboard
        if: always()
        run: |
          bazel run //quality/dashboard:generate_dashboard -- \
            --csv            codeql_results/codeql-results.csv \
            --clang-tidy-dir clang_tidy_results \
            --history        codeql_results/quality_history.json \
            --html           codeql_results/dashboard.html \
            --github-summary

      - name: Upload dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-dashboard
          path: |
            codeql_results/dashboard.html
            codeql_results/codeql-results.csv
            codeql_results/codeql-results.sarif
          retention-days: 14
