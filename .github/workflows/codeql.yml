name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC to catch new vulnerability signatures
    - cron: '0 8 * * 1'

jobs:
  analyze:
    name: CodeQL Analyze (Bazel)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Bazel-native CodeQL analysis
        run: bazel run //quality/static_analysis:codeql_lint -- --target=//...

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql_results/codeql-results.sarif
          category: /language:cpp

      - name: Upload CSV report artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-csv-report
          path: codeql_results/codeql-results.csv
          retention-days: 14
