name: Nightly Quality Checks

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks (No Deploy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y lcov

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run Clang-Tidy
        continue-on-error: true
        run: bazel test --config=clang-tidy //...

      - name: Run CodeQL
        continue-on-error: true
        run: bazel run //quality/static_analysis:codeql_lint -- --target=//...

      - name: Run Coverage
        continue-on-error: true
        run: bazel coverage //:calculator_test

      - name: Collect results & generate dashboard
        if: always()
        run: |
          mkdir -p clang_tidy_results coverage_results coverage_html
          find bazel-bin -name "*.AspectRulesLintClangTidy.report" -exec cp {} clang_tidy_results/ \; 2>/dev/null || true
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          [[ -f "$REPORT" ]] && cp "$REPORT" coverage_results/coverage.dat && genhtml "$REPORT" -o coverage_html --legend || true
          bazel run //quality/dashboard:generate_dashboard -- \
            --csv codeql_results/codeql-results.csv \
            --clang-tidy-dir clang_tidy_results \
            --lcov coverage_results/coverage.dat \
            --history codeql_results/quality_history.json \
            --html codeql_results/dashboard.html \
            --github-summary

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql_results/codeql-results.sarif
          category: /language:cpp
        continue-on-error: true

      - name: Upload generated quality dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-dashboard
          path: |
            codeql_results/dashboard.html
            codeql_results/quality_history.json
            coverage_html/
          retention-days: 14
