name: Nightly Quality Dashboard

on:
  schedule:
    # Runs every night at 02:00 UTC
    - cron: '0 2 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # ─── Job 1: Clang-Tidy ────────────────────────────────────────────────────
  clang-tidy:
    name: Clang-Tidy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run clang-tidy
        run: bazel test --config=clang-tidy //...

      - name: Collect clang-tidy reports
        if: always()
        run: |
          mkdir -p clang_tidy_results
          find bazel-bin -name "*.AspectRulesLintClangTidy.report" \
            -exec cp {} clang_tidy_results/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clang-tidy-results
          path: clang_tidy_results/
          retention-days: 30

  # ─── Job 2: CodeQL ────────────────────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    outputs:
      findings: ${{ steps.count.outputs.findings }}
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run CodeQL analysis
        run: bazel run //quality/static_analysis:codeql_lint -- --target=//...

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql_results/codeql-results.sarif
          category: /language:cpp

      - name: Count findings
        id: count
        if: always()
        run: |
          count=$(tail -n +1 codeql_results/codeql-results.csv 2>/dev/null | wc -l || echo 0)
          echo "findings=${count}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-results
          path: codeql_results/
          retention-days: 30

  # ─── Job 3: Coverage ──────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      line_rate: ${{ steps.summary.outputs.line_rate }}
    steps:
      - uses: actions/checkout@v4

      - name: Install lcov
        run: sudo apt-get update -qq && sudo apt-get install -y lcov

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run coverage
        run: bazel coverage //:calculator_test

      - name: Generate HTML report
        run: |
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          genhtml "$REPORT" --output-directory coverage_html --title "Calculator Coverage" --legend
          lcov --summary "$REPORT" 2>&1 | tee coverage_html/summary.txt

      - name: Copy lcov data
        if: always()
        run: |
          mkdir -p coverage_results
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          [ -f "$REPORT" ] && cp "$REPORT" coverage_results/coverage.dat || true

      - name: Extract line rate
        id: summary
        run: |
          rate=$(grep "lines" coverage_html/summary.txt | grep -oP '\d+\.\d+' | head -1 || echo "N/A")
          echo "line_rate=${rate}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-lcov
          path: coverage_results/
          retention-days: 30

  # ─── Job 4: Build dashboard and deploy to GitHub Pages ───────────────────
  dashboard:
    name: Build & Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [clang-tidy, codeql, coverage]
    if: always()
    permissions:
      contents: write   # needed to push to gh-pages branch
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Download CodeQL results
        uses: actions/download-artifact@v4
        with:
          name: codeql-results
          path: codeql_results/
        continue-on-error: true

      - name: Download clang-tidy reports
        uses: actions/download-artifact@v4
        with:
          name: clang-tidy-results
          path: clang_tidy_results/
        continue-on-error: true

      - name: Download coverage lcov
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage_results/
        continue-on-error: true

      - name: Download coverage HTML report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
        continue-on-error: true

      - name: Download quality history
        uses: actions/download-artifact@v4
        with:
          name: quality-history
          path: codeql_results/
        continue-on-error: true  # absent on first run

      - name: Generate HTML dashboard
        run: |
          bazel run //quality/dashboard:generate_dashboard -- \
            --csv            codeql_results/codeql-results.csv \
            --clang-tidy-dir clang_tidy_results \
            --lcov           coverage_results/coverage.dat \
            --history        codeql_results/quality_history.json \
            --html           codeql_results/dashboard.html \
            --github-summary

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-history
          path: codeql_results/quality_history.json
          retention-days: 90

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p gh-pages
          # Main dashboard
          cp codeql_results/dashboard.html gh-pages/index.html
          # Coverage sub-report (if produced)
          if [ -d coverage_html ]; then
            cp -r coverage_html gh-pages/coverage
          fi
          # Raw data files
          mkdir -p gh-pages/data
          cp codeql_results/codeql-results.csv  gh-pages/data/ 2>/dev/null || true
          cp codeql_results/codeql-results.sarif gh-pages/data/ 2>/dev/null || true
          # Inject a small nav bar into index.html so coverage link is visible
          sed -i 's|</body>|<footer style="margin-top:2rem;color:#8b949e;font-size:.8rem">\
            Run: '"${{ github.run_number }}"' &nbsp;|&nbsp; \
            Commit: '"${GITHUB_SHA::7}"' &nbsp;|&nbsp; \
            <a style="color:#58a6ff" href="coverage/index.html">Coverage report</a>\
          </footer></body>|' gh-pages/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
          commit_message: "chore: nightly quality dashboard [${{ github.run_number }}]"

      - name: Post summary
        if: always()
        run: |
          echo "## Nightly Quality Run #${{ github.run_number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clang-Tidy | ${{ needs.clang-tidy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CodeQL (findings: ${{ needs.codeql.outputs.findings }}) | ${{ needs.codeql.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage (lines: ${{ needs.coverage.outputs.line_rate }}%) | ${{ needs.coverage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Dashboard deployed to GitHub Pages." >> "$GITHUB_STEP_SUMMARY"
