name: Clang-Tidy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-tidy:
    name: Clang-Tidy Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run clang-tidy through Bazel
        run: bazel test --config=clang-tidy //...

      - name: Collect Clang-Tidy reports
        if: always()
        run: |
          mkdir -p clang_tidy_results
          find bazel-bin -name "*.AspectRulesLintClangTidy.report" \
            -exec cp {} clang_tidy_results/ \; 2>/dev/null || true

      - name: Upload Clang-Tidy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-reports
          path: clang_tidy_results/
          retention-days: 14
