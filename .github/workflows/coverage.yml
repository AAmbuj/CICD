name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: Code Coverage (lcov)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lcov

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run tests with coverage instrumentation
        run: bazel coverage //:calculator_test

      - name: Locate coverage report
        id: report_path
        run: |
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          echo "path=${REPORT}" >> "$GITHUB_OUTPUT"

      - name: Generate HTML report with genhtml
        run: |
          genhtml \
            "${{ steps.report_path.outputs.path }}" \
            --output-directory coverage_html \
            --title "Calculator Coverage" \
            --legend \
            --show-details

      - name: Print coverage summary
        run: |
          lcov \
            --summary "${{ steps.report_path.outputs.path }}"

      - name: Upload HTML coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/
          retention-days: 14

      - name: Upload raw lcov data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: ${{ steps.report_path.outputs.path }}
          retention-days: 14
